<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function findingMax() {
            // Get user input values
            let num1 = document.getElementById("num1").value.trim();
            let num2 = document.getElementById("num2").value.trim();
            let num3 = document.getElementById("num3").value.trim();

            // Check if inputs are valid numbers
            if (isNaN(num1) || isNaN(num2) || isNaN(num3) || num1 === "" || num2 === "" || num3 === "") {
                document.getElementById("result").innerText = "Please enter valid numbers!";
                return;
              }

            // Convert inputs to numbers

            num1 = parseFloat(num1);
            num2 = parseFloat(num2);
            num3 = parseFloat(num3);

            // Finding  the maximum number

            let maxNum = Math.max(num1, num2, num3);

            // Display result

            document.getElementById("result").innerText = `The maximum number is: ${maxNum}`;
        }
    </script>
</head>
<body>
    <h2>Finding the Maximum of Three Numbers</h2>
    <label for="num1">Enter first number:</label>
    <input type="text" id="num1" placeholder="Enter first number">
    <br><br>
    <label for="num2">Enter second number:</label>
    <input type="text" id="num2" placeholder="Enter second number">
    <br><br>
    <label for="num3">Enter third number:</label>
    <input type="text" id="num3" placeholder="Enter third number">
    <br><br>
    <button onclick="findingMax()">Click to Find the Maximum</button>
    <p id="result"></p> 
</body>
</html>
